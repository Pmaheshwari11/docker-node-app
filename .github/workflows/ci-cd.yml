name: CI/CD Pipeline

# ── Triggers ──────────────────────────────────
on:
  push:
    branches: [main] # full pipeline on main
  pull_request:
    branches: [main] # tests only on PRs

# ── Environment Variables ─────────────────────
env:
  IMAGE_NAME: pmaheshwari11/docker-node-app

jobs:
  # ════════════════════════════════════════════
  # JOB 1: Test
  # Run on every push and PR
  # ════════════════════════════════════════════
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm" # cache node_modules between runs

      - name: Install dependencies
        run: npm ci # ci = clean install, faster than npm install

      - name: Run tests
        run: npm test

  # ════════════════════════════════════════════
  # JOB 2: Build & Push
  # Only runs on push to main (not PRs)
  # Only runs if tests pass
  # ════════════════════════════════════════════
  build-and-push:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: test # wait for test job to pass

    # Skip this job on pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Extract metadata for tags
      - name: Extract image metadata
        id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "version=$SHA" >> $GITHUB_OUTPUT
          echo "Image will be tagged: ${{ env.IMAGE_NAME }}:$SHA"

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push with multiple tags
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Image pushed successfully
        run: |
          echo "✅ Image pushed:"
          echo "   ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
          echo "   ${{ env.IMAGE_NAME }}:latest"

  # ════════════════════════════════════════════
  # JOB 3: Summary
  # ════════════════════════════════════════════
summary:
  name: 📋 Pipeline Summary
  runs-on: ubuntu-latest
  needs: [test, build-and-push, deploy]
  if: always()

  steps:
    - name: Print summary
      run: |
        echo "## Pipeline Results" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Tests       | ${{ needs.test.result }}           |" >> $GITHUB_STEP_SUMMARY
        echo "| Build & Push| ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Deploy      | ${{ needs.deploy.result }}         |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🌍 Live URL: http://${{ secrets.EC2_HOST }}/api/health" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════
  # JOB 4: Deploy to EC2
  # SSHs into server, pulls new image, restarts
  # Only runs after successful build-and-push
  # ════════════════════════════════════════════
deploy:
  name: 🚀 Deploy to EC2
  runs-on: ubuntu-latest
  needs: build-and-push
  if: github.event_name == 'push' && github.ref == 'refs/heads/main'

  steps:
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/app

          # Pull latest images from Docker Hub
          docker compose pull

          # Restart with zero-downtime
          docker compose up -d --remove-orphans

          # Verify deployment succeeded
          docker compose ps

          # Quick health check
          sleep 5
          curl -f http://localhost/api/health && echo "✅ Deploy successful" || echo "❌ Health check failed"
