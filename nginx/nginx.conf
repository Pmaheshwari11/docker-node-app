events {
    worker_connections 1024;
}

http {
    # ── Upstream — our Node.js app ──────────────
    # "nodejs" = the service name in docker-compose.yml
    # Compose DNS resolves it automatically
    upstream nodejs_app {
        server nodejs:3000;
    }

    server {
        listen 80;

        # ── Proxy all /api requests to Node ────
        location /api {
            proxy_pass         http://nodejs_app;
            proxy_http_version 1.1;

            # Required headers for Node.js
            proxy_set_header   Upgrade      $http_upgrade;
            proxy_set_header   Connection   'upgrade';
            proxy_set_header   Host         $host;
            proxy_set_header   X-Real-IP    $remote_addr;

            # Pass the real client IP to Node
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_cache_bypass $http_upgrade;
        }

        # ── Health check endpoint for Nginx itself
        location /health {
            return 200 'Nginx is healthy\n';
            add_header Content-Type text/plain;
        }

        # ── Everything else → 404 ───────────────
        location / {
            return 404 'Not found\n';
            add_header Content-Type text/plain;
        }
    }
}
